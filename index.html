<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF į Docs Konverteris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f3f4f6;
      }
      /* Custom scrollbar for document feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8; 
      }
      .A4-paper {
        width: 100%;
        max-width: 210mm;
        min-height: 297mm;
        padding: clamp(15px, 5vw, 20mm);
        margin: 20px auto;
        background: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        box-sizing: border-box;
        line-height: 1.6;
        color: #1f2937;
        font-size: 11pt;
        font-weight: 400;
        letter-spacing: 0.2px;
        word-spacing: 0.5px;
        border-radius: 2px;
      }
      @media screen and (max-width: 768px) {
        .A4-paper {
          margin: 0;
          min-height: auto;
          box-shadow: none;
          border-radius: 0;
        }
      }
      .A4-paper h1, .A4-paper h2, .A4-paper h3 {
        color: #111827;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
      }
      .A4-paper p {
        margin-bottom: 1em;
      }
      .A4-paper table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1.5em;
        border: 1px solid #d1d5db;
      }
      .A4-paper th, .A4-paper td {
        border: 1px solid #d1d5db;
        padding: 0.75rem;
        text-align: left;
      }
      .A4-paper th {
        background-color: #f9fafb;
        font-weight: 600;
      }
      @media print {
        body {
          background: white;
        }
        .no-print {
          display: none;
        }
        .A4-paper {
          margin: 0;
          box-shadow: none;
        }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .animate-shimmer {
        animation: shimmer 2s infinite linear;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",

    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
